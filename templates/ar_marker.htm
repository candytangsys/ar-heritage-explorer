<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR 掃描 - {{ lm.name_zh }}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    .ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
      pointer-events: none;
    }
    .top-bar {
      background: rgba(15,25,35,0.85); backdrop-filter: blur(8px);
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      pointer-events: all;
    }
    .back-btn {
      color: #4fc3f7; text-decoration: none; font-size: 14px;
      background: rgba(79,195,247,0.1); padding: 6px 12px; border-radius: 6px;
    }
    .landmark-name { color: #fff; font-size: 15px; font-weight: 600; }
    .landmark-sub { color: rgba(255,255,255,0.4); font-size: 12px; }

    .hint-box {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(15,25,35,0.9); border: 1px solid rgba(79,195,247,0.3);
      border-radius: 12px; padding: 14px 20px; text-align: center;
      color: #fff; font-size: 14px; z-index: 999; width: 85%; max-width: 340px;
      pointer-events: none;
    }
    .hint-box .icon { font-size: 28px; margin-bottom: 6px; }
    .hint-box p { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 4px; }

    .marker-preview {
      position: fixed; bottom: 140px; right: 16px; z-index: 999;
      background: rgba(15,25,35,0.9); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 10px; text-align: center;
      pointer-events: all;
    }
    .marker-preview img { width: 80px; height: 80px; border-radius: 6px; }
    .marker-preview p { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 6px; }

    a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="ui-overlay">
    <div class="top-bar">
      <a href="/landmark/{{ lm.id }}" class="back-btn">← 返回</a>
      <div>
        <div class="landmark-name">{{ lm.name_zh }}</div>
        <div class="landmark-sub">AR Marker 掃描模式</div>
      </div>
    </div>
  </div>

  <div class="marker-preview">
    <img src="https://ar-js-org.github.io/AR.js/data/images/hiro.png" alt="Hiro Marker">
    <p>對準此 Marker</p>
  </div>

  <div class="hint-box">
    <div class="icon">📷</div>
    <strong>將鏡頭對準 Hiro Marker</strong>
    <p>地標資訊將疊加顯示在標記上方</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false">

    <a-marker preset="hiro">

      <!-- 背景板 -->
      <a-plane
        position="0 0.1 0"
        rotation="-90 0 0"
        width="2.2" height="2.8"
        color="#0f1923"
        opacity="0.92">
      </a-plane>

      <!-- 地標名稱（中文） -->
      <a-text
        value="{{ lm.name_zh }}"
        position="0 0.15 -0.7"
        rotation="-90 0 0"
        align="center"
        color="#4fc3f7"
        width="4"
        font="https://cdn.aframe.io/fonts/Roboto-msdf.json">
      </a-text>

      <!-- 地標名稱（英文） -->
      <a-text
        value="{{ lm.name_en }}"
        position="0 0.15 -0.4"
        rotation="-90 0 0"
        align="center"
        color="#ffffff"
        width="2.5"
        opacity="0.6">
      </a-text>

      <!-- 地址 -->
      <a-text
        value="{{ lm.address }}"
        position="0 0.15 -0.1"
        rotation="-90 0 0"
        align="center"
        color="#81d4fa"
        width="2.2"
        opacity="0.8">
      </a-text>

      <!-- 介紹文字（截短） -->
      <a-text
        value="{{ lm.description_zh[:40] }}..."
        position="0 0.15 0.35"
        rotation="-90 0 0"
        align="center"
        color="#ffffff"
        width="2"
        opacity="0.7"
        wrap-count="22">
      </a-text>

      <!-- 小測驗提示 -->
      {% if lm.quiz_question %}
      <a-text
        value="🎯 前往地標頁面挑戰小測驗！"
        position="0 0.15 0.9"
        rotation="-90 0 0"
        align="center"
        color="#ffd54f"
        width="2">
      </a-text>
      {% endif %}

      <!-- 裝飾方塊 -->
      <a-box
        position="0 0.6 -0.95"
        width="2.2" height="0.08" depth="0.08"
        color="#4fc3f7"
        opacity="0.8">
      </a-box>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
