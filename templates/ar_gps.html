<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR GPS 探索</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }

    .top-bar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
      background: rgba(15,25,35,0.88); backdrop-filter: blur(8px);
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      color: #4fc3f7; text-decoration: none; font-size: 14px;
      background: rgba(79,195,247,0.1); padding: 6px 12px; border-radius: 6px;
    }
    .title { color: #fff; font-size: 15px; font-weight: 600; }
    .sub { color: rgba(255,255,255,0.4); font-size: 12px; }

    .status-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 999;
      background: rgba(15,25,35,0.88); backdrop-filter: blur(8px);
      padding: 14px 20px;
    }
    .gps-info { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 6px; }
    .gps-coords { color: #4fc3f7; font-size: 13px; font-weight: 500; }

    .landmark-list {
      position: fixed; top: 70px; right: 12px; z-index: 999;
      display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto;
    }
    .lm-chip {
      background: rgba(15,25,35,0.88); border: 1px solid rgba(79,195,247,0.25);
      border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 12px;
      text-decoration: none; display: block; max-width: 130px;
    }
    .lm-chip .dist { color: #4fc3f7; font-size: 11px; margin-top: 2px; }

    .hint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(15,25,35,0.92); border: 1px solid rgba(79,195,247,0.2);
      border-radius: 14px; padding: 24px 28px; text-align: center;
      color: #fff; z-index: 998; width: 80%; max-width: 300px;
    }
    .hint .icon { font-size: 36px; margin-bottom: 10px; }
    .hint p { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.6; }
    .hint.hidden { display: none; }

    a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="back-btn">← 地圖</a>
    <div>
      <div class="title">GPS AR 探索模式</div>
      <div class="sub">走近地標即可看見 AR 標記</div>
    </div>
  </div>

  <div class="landmark-list" id="lm-list"></div>

  <div class="hint" id="hint-box">
    <div class="icon">📡</div>
    <strong>正在取得 GPS 位置...</strong>
    <p>請允許瀏覽器存取你的位置，然後將手機鏡頭朝向地標方向</p>
  </div>

  <div class="status-bar">
    <div class="gps-info">目前 GPS 座標</div>
    <div class="gps-coords" id="gps-display">取得中...</div>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
    renderer="antialias: true; alpha: true"
    loading-screen="enabled: false"
    embedded>

    <a-camera gps-camera rotation-reader></a-camera>

    {% for lm in landmarks %}
    <a-entity
      gps-entity-place="latitude: {{ lm.lat }}; longitude: {{ lm.lng }};"
      look-at="[gps-camera]">

      <!-- 發光圓球 -->
      <a-sphere
        position="0 1.5 0"
        radius="0.4"
        color="#4fc3f7"
        opacity="0.85"
        animation="property: position; to: 0 2.0 0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
      </a-sphere>

      <!-- 光柱 -->
      <a-cylinder
        position="0 0 0"
        radius="0.05" height="3"
        color="#4fc3f7"
        opacity="0.3">
      </a-cylinder>

      <!-- 地標名稱 -->
      <a-text
        value="{{ lm.name_zh }}"
        position="0 3 0"
        align="center"
        color="#ffffff"
        width="6"
        look-at="[gps-camera]">
      </a-text>

      <!-- 點擊連結 -->
      <a-plane
        position="0 2.8 0"
        width="2" height="0.5"
        color="#0f1923"
        opacity="0.7"
        class="clickable"
        onclick="window.location.href='/landmark/{{ lm.id }}'">
      </a-plane>
      <a-text
        value="點擊查看詳情"
        position="0 2.8 0.01"
        align="center"
        color="#4fc3f7"
        width="4">
      </a-text>

    </a-entity>
    {% endfor %}

  </a-scene>

  <script>
    const landmarks = {{ landmarks | tojson | safe }};

    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        document.getElementById('gps-display').textContent =
          `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        document.getElementById('hint-box').classList.add('hidden');

        const list = document.getElementById('lm-list');
        list.innerHTML = '';
        landmarks
          .map(lm => ({ ...lm, dist: getDistance(lat, lng, lm.lat, lm.lng) }))
          .sort((a, b) => a.dist - b.dist)
          .slice(0, 5)
          .forEach(lm => {
            const dist = lm.dist < 1000
              ? `${Math.round(lm.dist)} 公尺`
              : `${(lm.dist/1000).toFixed(1)} 公里`;
            list.innerHTML += `
              <a href="/landmark/${lm.id}" class="lm-chip">
                ${lm.name_zh}
                <div class="dist">📍 ${dist}</div>
              </a>`;
          });
      }, err => {
        document.getElementById('gps-display').textContent = 'GPS 取得失敗';
      }, { enableHighAccuracy: true });
    }
  </script>
</body>
</html>
