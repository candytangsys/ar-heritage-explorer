<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>後台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1923; color: #fff; }
    header {
      background: rgba(15,25,35,0.98); border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 14px 28px; display: flex; justify-content: space-between; align-items: center;
    }
    header .logo { font-size: 18px; font-weight: 700; color: #4fc3f7; }
    header .actions { display: flex; gap: 12px; align-items: center; }
    .btn {
      padding: 8px 18px; border-radius: 8px; font-size: 14px; cursor: pointer;
      text-decoration: none; display: inline-block; font-weight: 500;
    }
    .btn-primary { background: #4fc3f7; color: #0f1923; border: none; }
    .btn-primary:hover { background: #0288d1; color: #fff; }
    .btn-outline { background: transparent; color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.15); }
    .btn-outline:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .btn-danger { background: rgba(244,67,54,0.15); color: #ef5350;
      border: 1px solid rgba(244,67,54,0.3); }
    .btn-danger:hover { background: rgba(244,67,54,0.3); }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    .stat { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 32px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 16px 20px; }
    .stat-card .num { font-size: 28px; font-weight: 700; color: #4fc3f7; }
    .stat-card .label { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.35); padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .thumb { width: 48px; height: 36px; object-fit: cover; border-radius: 4px; }
    .no-img { width: 48px; height: 36px; background: rgba(255,255,255,0.08);
      border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .td-actions { display: flex; gap: 8px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">⚙ 後台管理</div>
    <div class="actions">
      <a href="/game/map" class="btn btn-outline">← 前台地圖</a>
      <a href="/admin/landmark/new" class="btn btn-primary">+ 新增地標</a>
      <a href="/admin/logout" class="btn btn-outline">登出</a>
    </div>
  </header>
  <div class="container">
    <div class="stat">
      <div class="stat-card">
        <div class="num">{{ landmarks|length }}</div>
        <div class="label">地標總數</div>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>圖片</th><th>名稱</th><th>地址</th><th>座標</th><th>操作</th>
        </tr>
      </thead>
      <tbody>
        {% for lm in landmarks %}
        <tr>
          <td>
            {% if lm.image_path %}
              <img src="/static/{{ lm.image_path }}" class="thumb">
            {% else %}
              <div class="no-img">🏛</div>
            {% endif %}
          </td>
          <td>
            <div style="font-weight:500;">{{ lm.name_zh }}</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);">{{ lm.name_en }}</div>
          </td>
          <td style="color:rgba(255,255,255,0.5);">{{ lm.address }}</td>
          <td style="color:rgba(255,255,255,0.4);font-size:13px;">{{ lm.lat }}, {{ lm.lng }}</td>
          <td>
            <div class="td-actions">
              <a href="/landmark/{{ lm.id }}" class="btn btn-outline" style="font-size:13px;padding:6px 12px;">查看</a>
              <a href="/admin/landmark/{{ lm.id }}/edit" class="btn btn-outline" style="font-size:13px;padding:6px 12px;">編輯</a>
              <form method="POST" action="/admin/landmark/{{ lm.id }}/delete"
                    onsubmit="return confirm('確定刪除？')">
                <button type="submit" class="btn btn-danger" style="font-size:13px;padding:6px 12px;">刪除</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
