<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地標解鎖！ - 淡江探索者</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: auto; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    /* Confetti particles */
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute;
      border-radius: 3px;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 28px;
      max-width: 400px;
      width: 100%;
    }

    .icon-wrap {
      font-size: 72px;
      margin-bottom: 14px;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes pop {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    h1 { font-size: 26px; font-weight: 700; color: #4fc3f7; margin-bottom: 6px; }
    .lm-name {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
      min-height: 22px;
    }

    .result-pill {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .result-pill.correct { background: rgba(76,175,80,0.18); color: #81c784; border: 1px solid rgba(76,175,80,0.35); }
    .result-pill.wrong   { background: rgba(244,67,54,0.18); color: #e57373; border: 1px solid rgba(244,67,54,0.35); }

    .pts-card {
      background: rgba(255,213,79,0.08);
      border: 1px solid rgba(255,213,79,0.25);
      border-radius: 16px;
      padding: 22px 20px;
      margin-bottom: 16px;
    }
    .pts-big {
      font-size: 54px;
      font-weight: 700;
      color: #ffd54f;
      line-height: 1;
      letter-spacing: -1px;
    }
    .pts-label { font-size: 13px; color: rgba(255,255,255,0.38); margin-top: 6px; }

    .bonus-card {
      background: rgba(255,138,101,0.1);
      border: 1px solid rgba(255,138,101,0.3);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #ffab91;
      display: none;
      animation: slide-in 0.4s ease 0.6s both;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .achievement-card {
      background: rgba(79,195,247,0.08);
      border: 1px solid rgba(79,195,247,0.3);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 20px;
      display: none;
      animation: slide-in 0.4s ease 0.8s both;
    }
    .achievement-card .ach-icon { font-size: 28px; margin-bottom: 4px; }
    .achievement-card .ach-title { font-size: 15px; font-weight: 700; color: #4fc3f7; }
    .achievement-card .ach-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 15px;
      background: #4fc3f7;
      color: #0f1923;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      margin-bottom: 10px;
    }
    .btn-primary:hover { background: #0288d1; color: #fff; }
    .btn-ghost {
      display: block;
      width: 100%;
      padding: 13px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

    .lm-photo {
      width: 100%; height: 160px; object-fit: cover;
      border-radius: 12px; margin-bottom: 16px;
      display: none;
      animation: slide-in 0.4s ease 0.3s both;
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="content">
    <div class="icon-wrap">🔓</div>
    <h1>地標解鎖！</h1>
    <div class="lm-name" id="lm-name">載入中...</div>
    <div class="result-pill" id="result-pill"></div>

    <img id="lm-photo" class="lm-photo" alt="地標照片">

    <div class="pts-card">
      <div class="pts-big" id="pts-display">+0</div>
      <div class="pts-label">本次獲得探索點數</div>
    </div>

    <div class="bonus-card" id="bonus-card">
      🎊 完成所有地標！額外獲得 <strong>+100 pts</strong> 特別獎勵！
    </div>

    <div class="achievement-card" id="achievement-card">
      <div class="ach-icon" id="ach-icon"></div>
      <div class="ach-title" id="ach-title"></div>
      <div class="ach-sub">新成就解鎖！</div>
    </div>

    <a href="/game/map" class="btn-primary">繼續探索地圖 →</a>
    <a href="/game/profile" class="btn-ghost">查看我的成就</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const landmarkId = parseInt(params.get('landmark_id') || '0');
    const pointsEarned = parseInt(params.get('points') || '0');
    const isCorrect = params.get('correct') === 'true';
    const bonus = parseInt(params.get('bonus') || '0');

    // Result pill
    const pill = document.getElementById('result-pill');
    if (isCorrect) {
      pill.textContent = '✅ 測驗答對！';
      pill.className = 'result-pill correct';
    } else {
      pill.textContent = '📚 繼續加油！';
      pill.className = 'result-pill wrong';
    }

    // Animate point counter
    function countUp(el, target, duration) {
      const start = Date.now();
      const tick = () => {
        const elapsed = Date.now() - start;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        el.textContent = '+' + Math.floor(ease * target);
        if (progress < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    }
    setTimeout(() => countUp(document.getElementById('pts-display'), pointsEarned, 900), 400);

    // Completion bonus
    if (bonus > 0) {
      document.getElementById('bonus-card').style.display = 'block';
    }

    // Confetti
    (function createParticles() {
      const colors = ['#4fc3f7','#ffd54f','#81c784','#ff8a65','#ce93d8','#fff176'];
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 8 + 5;
        p.style.cssText = [
          `width:${size}px`,
          `height:${size * (Math.random() > 0.5 ? 2.5 : 1)}px`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          `left:${Math.random() * 100}%`,
          `animation-duration:${(Math.random() * 2.5 + 2).toFixed(1)}s`,
          `animation-delay:${(Math.random() * 1.5).toFixed(2)}s`,
          `opacity:${(Math.random() * 0.5 + 0.4).toFixed(2)}`
        ].join(';');
        container.appendChild(p);
      }
    })();

    // Fetch landmark name and check for new achievement
    (async function init() {
      // Landmark name
      if (landmarkId) {
        try {
          const r = await fetch('/api/landmarks');
          if (r.ok) {
            const lms = await r.json();
            const lm = lms.find(l => l.id === landmarkId);
            if (lm) {
              document.getElementById('lm-name').textContent = lm.name_zh;
              if (lm.image_path) {
                const img = document.getElementById('lm-photo');
                img.src = '/static/' + lm.image_path;
                img.style.display = 'block';
              }
            }
          }
        } catch (e) { /* non-critical */ }
      }

      // Achievement detection
      const deviceId = localStorage.getItem('tku_device_id');
      if (!deviceId) return;
      try {
        const r = await fetch('/api/game/progress?device_id=' + deviceId);
        if (!r.ok) return;
        const d = await r.json();
        const unlocked = d.unlocked.length;
        const total = d.total_landmarks;
        const correct = (d.progress || []).filter(p => p.quiz_correct).length;

        // Only show achievement if this unlock was the exact trigger
        const milestones = [
          { threshold: total, icon: '🏆', title: '淡江通',     desc: '解鎖全部地標' },
          { threshold: 3,     icon: '🗺️', title: '校園探索者', desc: '解鎖 3 個地標' },
          { threshold: 1,     icon: '🐣', title: '淡江新鮮人', desc: '解鎖第 1 個地標' },
        ];
        const hit = milestones.find(m => m.threshold > 0 && unlocked === m.threshold);
        if (hit) {
          document.getElementById('ach-icon').textContent  = hit.icon;
          document.getElementById('ach-title').textContent = hit.icon + ' ' + hit.title;
          document.getElementById('achievement-card').style.display = 'block';
        }

        // Override with 達人 if all correct
        if (unlocked >= total && total > 0 && correct >= total) {
          document.getElementById('ach-icon').textContent  = '⭐';
          document.getElementById('ach-title').textContent = '⭐ 淡江達人';
          document.getElementById('achievement-card').style.display = 'block';
        }
      } catch (e) { /* non-critical */ }
    })();
  </script>
</body>
</html>
